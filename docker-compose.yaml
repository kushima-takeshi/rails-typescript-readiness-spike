services:
  postgres:
    image: postgres:16-alpine
    container_name: readiness-spike-postgres
    environment:
      POSTGRES_DB: readiness_spike_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - readiness_spike_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d readiness_spike_development"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  readiness_spike_pg_data:
